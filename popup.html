<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Film Saver</title>
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 15px;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #a87ffb;
            border-bottom: 2px solid #7e57c2;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .empty-state {
            text-align: center;
            color: #888;
            font-style: italic;
            font-size: 14px;
            padding: 20px 0;
        }
        .movie-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .movie-item {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .movie-title {
            font-weight: bold;
            font-size: 14px;
            word-break: break-word;
        }
        .movie-date {
            font-size: 11px;
            color: #888;
        }
        .actions {
            display: flex;
            gap: 5px;
        }
        .btn {
            flex: 1;
            padding: 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: opacity 0.2s;
        }
        .btn:hover {
            opacity: 0.8;
        }
        .btn-open {
            background-color: #26a69a;
        }
        .btn-delete {
            background-color: #e53935;
        }
        .settings-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #a87ffb;
            text-decoration: none;
        }
        .settings-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Последние сохраненные</h2>
    
    <div id="movieContainer">
        <!-- Сюда будут добавляться фильмы -->
    </div>

    <a href="options.html" target="_blank" class="settings-link">⚙️ Настройки расширения</a>

    <script src="popup.js"></script>
</body>
</html>
