<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Obsidian Film Saver</title>
    <style>
        body {
            width: 320px;
            margin: 0;
            padding: 15px;
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #a87ffb;
            border-bottom: 2px solid #7e57c2;
            padding-bottom: 8px;
            margin-bottom: 12px;
        }
        .empty-state {
            text-align: center;
            color: #888;
            font-style: italic;
            font-size: 14px;
            padding: 20px 0;
        }
        .movie-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .movie-item {
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .movie-title {
            font-weight: 600;
            font-size: 13px;
            color: #e0e0e0;
            line-height: 1.3;
            word-break: break-word;
        }
        .movie-date {
            font-size: 10px;
            color: #777;
            margin-bottom: 4px;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            flex: 1;
            padding: 7px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover:not(:disabled) {
            opacity: 0.8;
        }
        .btn:active:not(:disabled) {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.5);
        }
        .btn-open {
            background-color: #7e57c2;
        }
        .btn-delete {
            background-color: #e53935;
        }
        .btn-base {
            background-color: #7e57c2;
            margin-top: 15px;
            width: 100%;
            padding: 8px;
            font-size: 13px;
        }
        .settings-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #a87ffb;
            text-decoration: none;
        }
        .settings-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h2>Последние сохраненные</h2>
    
    <div id="movieContainer">
        <!-- Сюда будут добавляться фильмы -->
    </div>

    <button id="btnGenerateBase" class="btn btn-base">🎬 Создать базу (Галерея)</button>

    <a href="options.html" target="_blank" class="settings-link">⚙️ Настройки расширения</a>

    <script src="popup.js"></script>
</body>
</html>
