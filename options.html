<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Настройки Obsidian Film Saver</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 20px;
            background-color: #0a0a0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(25, 25, 30, 0.6);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(168, 85, 247, 0.15);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            backdrop-filter: blur(12px);
        }
        h2 {
            margin-top: 0;
            color: #c084fc;
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h2::before {
            content: "⚙️";
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #fff;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px 12px;
            box-sizing: border-box;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: rgba(168, 85, 247, 0.6);
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.1);
        }
        button {
            padding: 12px 20px;
            background-color: rgba(168, 85, 247, 0.2);
            color: #c084fc;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        button:hover {
            background-color: rgba(168, 85, 247, 0.4);
            color: #fff;
        }
        button:active {
            transform: scale(0.98);
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
            font-weight: 500;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .info {
            font-size: 12px;
            color: #888;
            margin-top: 6px;
            display: block;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Настройки</h2>
        <div class="form-group">
            <label for="apiKey">Local REST API Key (Ключ авторизации)</label>
            <input type="password" id="apiKey" placeholder="Вставьте ключ из Obsidian здесь">
            <span class="info">Ключ можно найти в настройках плагина Local REST API в Obsidian.</span>
        </div>
        <div class="form-group">
            <label for="apiUrl">Адрес сервера (HTTP сервер)</label>
            <input type="text" id="apiUrl" value="http://127.0.0.1:27123">
        </div>
        <div class="form-group">
            <label for="basePath">Базовая папка в Obsidian</label>
            <input type="text" id="basePath" value="Фильмы и Сериалы">
            <span class="info">Папка, внутри которой скрипт будет искать папки "Фильмы" и "Сериалы"</span>
        </div>
        
        <button id="saveBtn">Сохранить</button>
        <div id="status" class="status">Настройки сохранены!</div>
    </div>
    <script src="options.js"></script>
</body>
</html>
